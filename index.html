<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Contacto</title>
</head>
<body>

  <h2>Formulario de Contacto</h2>

  <form id="formulario">
    
    <!-- Campo Nombre -->
    <label for="nombre">Nombre:</label><br>
    <input 
      type="text" 
      id="nombre" 
      name="nombre"
      placeholder="Ingresa tu nombre"
      required
      minlength="3"
    >
    <br><br>

    <!-- Campo Correo -->
    <label for="correo">Correo:</label><br>
    <input 
      type="email" 
      id="correo" 
      name="correo"
      placeholder="ejemplo@correo.com"
      required
    >
    <br><br>

    <!-- Campo Mensaje -->
    <label for="mensaje">Mensaje:</label><br>
    <textarea 
      id="mensaje" 
      name="mensaje"
      placeholder="Escribe tu mensaje"
      required
      minlength="10"
    ></textarea>
    <br><br>

    <!-- Botón -->
    <button type="submit">Enviar</button>

  </form>

  <!-- Estado / mensajes -->
  <p id="estado"></p>

  <!-- Enlace al JS -->
  <script src="script_aiep.js"></script>

</body>
</html>
